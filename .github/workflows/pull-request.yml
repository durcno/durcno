name: Pull Request

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - ".vscode/**"
      - ".github/**"
      - ".agents/**"
      - "**/*.md"
      - "**/*.svg"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt-lint-typecheck:
    name: Format & Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm i --frozen-lockfile

      - name: Format
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Tsc check src
        run: pnpm run tsclint

      - name: Tsc check CLI
        run: pnpm run tsclint-cli

      - name: Tsc check type-tests
        run: pnpm run test-types

      - name: Tsc check tests
        run: pnpm run tsclint-tests

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm i --frozen-lockfile --filter='durcno' --filter='./tests'

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm test
        working-directory: tests